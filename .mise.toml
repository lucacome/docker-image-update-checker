[tools]
hk = "1.40.0"
pkl = "0.31.1"
actionlint = "1.7.12"
yamllint = "1.38.0"
markdownlint-cli2 = "0.22.0"
gitleaks = "8.30.1"
editorconfig-checker = "3.6.1"
"npm:prettier" = "3.8.1"
"npm:eslint" = "10.1.0"
"pipx:codespell" = "2.4.2"

[tasks.install]
alias = "i"
description = "Install dependencies"
run = "yarn install"

[tasks.build]
alias = "b"
description = "Build the project"
run = "yarn run build"

[tasks.lint]
alias = "l"
description = "Lint the codebase"
run = "hk check --all"

[tasks.format]
alias = "fmt"
description = "Format the codebase"
run = "hk fix --all"

[tasks.postlint]
description = "Run post-lint checks"
run = "git diff --exit-code"

[settings]
idiomatic_version_file_enable_tools = ["node", "yarn"]
experimental = true

[prepare.yarn]
auto = true

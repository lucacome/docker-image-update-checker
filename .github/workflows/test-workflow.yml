name: Workflow Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref_name }}-test-workflow
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  #####################################
  # Singe platform tests

  test1:
    name: Test Update Needed
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: library/nginx:1.21.0
          image: nginx/nginx-ingress:2.1.0
          platforms: linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"

      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "true" ]]; then
            exit 1
          fi

  test2:
    name: Test Update Not Needed
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.21.0
          image: library/nginx:1.21.0
          platforms: linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi

  test3:
    name: Test image with only one platform
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: alpine:3.17.1
          image: lucacome/alpine-amd64
      - name: Get Test Output
        run: echo "Workflow Docker Image ${{ steps.test.outputs.needs-updating }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi

  test4:
    name: Test Update Needed on ARM64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.21.0
          image: nginx/nginx-ingress:2.1.0
          platforms: linux/arm64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "true" ]]; then
            exit 1
          fi

  #####################################
  # Test with multiple platforms

  test5:
    name: Test Update Needed on multiple platforms with spaces
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.21.0
          image: nginx/nginx-ingress:2.1.0
          platforms: linux/arm64, linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "true" ]]; then
            exit 1
          fi

  test6:
    name: Test Update Not Needed on multiple platforms
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.21.0
          image: library/nginx:1.21.0
          platforms: linux/arm64,linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi

  test7:
    name: Test GitHub
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.25.2-alpine
          image: ghcr.io/nginxinc/nginx-gateway-fabric/nginx:1.0.0
          platforms: linux/arm64,linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi

  test8:
    name: Test Update Not Needed on multiple (all) platforms
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: nginx:1.21.0
          image: library/nginx:1.21.0
          platforms: all
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi

  #####################################
  # Test with platform variants

  test9:
    name: Test Update Needed on multiple platforms with variants
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: alpine:latest
          image: golang:1.14.15-alpine3.13
          platforms: linux/arm64/v8,linux/arm/v7,linux/amd64
      - name: Get Test Output
        run: echo "Workflow Docker Image ${{ steps.test.outputs.needs-updating }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "true" ]]; then
            exit 1
          fi

  test10:
    name: Test Update Not Needed on multiple platforms with variants
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Test Action
        id: test
        uses: ./
        with:
          base-image: alpine:3.17.2
          image: alpine:3.17.2
          platforms: |
            linux/arm64/v8
            linux/arm/v7
            linux/amd64
      - name: Get Test Output
        run: |
          echo "Needs updating: ${{ steps.test.outputs.needs-updating }}"
          echo "Images: ${{ steps.test.outputs.diff-images }}"
      - name: Check value
        run: |
          if [[ "${{ steps.test.outputs.needs-updating }}" != "false" ]]; then
            exit 1
          fi
